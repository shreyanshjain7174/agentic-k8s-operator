apiVersion: v1
kind: Secret
metadata:
  name: {{ include "postgresql.fullname" . }}-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "postgresql.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": "pre-install,pre-upgrade"
    "helm.sh/hook-weight": "-5"
type: Opaque
{{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace (printf "%s-credentials" (include "postgresql.fullname" .))) }}
stringData:
  POSTGRES_DB: {{ .Values.auth.database | quote }}
  POSTGRES_USER: {{ .Values.auth.username | quote }}
  {{- if and $existingSecret $existingSecret.data (index $existingSecret.data "POSTGRES_PASSWORD") }}
  POSTGRES_PASSWORD: {{ index $existingSecret.data "POSTGRES_PASSWORD" | b64dec | quote }}
  {{- else if or (eq .Values.auth.password "changeme") (eq .Values.auth.password "") }}
  POSTGRES_PASSWORD: {{ randAlphaNum 32 | quote }}
  {{- else }}
  POSTGRES_PASSWORD: {{ .Values.auth.password | quote }}
  {{- end }}
  {{- if and $existingSecret $existingSecret.data (index $existingSecret.data "POSTGRES_POSTGRES_PASSWORD") }}
  POSTGRES_POSTGRES_PASSWORD: {{ index $existingSecret.data "POSTGRES_POSTGRES_PASSWORD" | b64dec | quote }}
  {{- else if or (eq .Values.auth.postgresPassword "changeme") (eq .Values.auth.postgresPassword "") }}
  POSTGRES_POSTGRES_PASSWORD: {{ randAlphaNum 32 | quote }}
  {{- else }}
  POSTGRES_POSTGRES_PASSWORD: {{ .Values.auth.postgresPassword | quote }}
  {{- end }}
