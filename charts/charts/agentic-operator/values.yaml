replicaCount: 1
image:
  repository: ghcr.io/clawdlinux/agentic-operator-core/agentic-operator
  tag: "latest"
  pullPolicy: Always
service:
  type: ClusterIP
  port: 8080
  metricsPort: 8081
resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "1000m"
    memory: "512Mi"
leaderElection: true
logLevel: info
env: {}
