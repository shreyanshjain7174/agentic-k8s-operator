name: agentctl-release

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build agentctl
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          BIN_NAME="agentctl-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -ldflags "-X main.version=${GITHUB_REF_NAME}" -o "dist/${BIN_NAME}" ./cmd/agentctl/...

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
