name: OSS/Private Boundary Guard

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  oss-private-boundary:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate OSS/private boundary policy
        shell: bash
        run: |
          BASE_SHA=""
          HEAD_SHA=""

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          BASE_REF="${BASE_SHA}" HEAD_REF="${HEAD_SHA}" bash scripts/check_oss_private_boundary.sh