name: Landing Quality Gate

on:
  pull_request:
    paths:
      - "landing/**"
      - ".github/workflows/landing-quality-gate.yml"
  push:
    branches:
      - main
    paths:
      - "landing/**"
      - ".github/workflows/landing-quality-gate.yml"
  workflow_dispatch:

jobs:
  landing-quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: landing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: landing/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
