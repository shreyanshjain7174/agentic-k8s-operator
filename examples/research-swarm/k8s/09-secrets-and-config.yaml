---
apiVersion: v1
kind: Secret
metadata:
  name: litellm-keys
  namespace: agentic-demo
type: Opaque
stringData:
  researcher-key: sk-researcher-virtual
  writer-key: sk-writer-virtual
  editor-key: sk-editor-virtual
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: agentic-demo
type: Opaque
stringData:
  username: spans
  password: spans_prod
  connection-string: "postgresql://spans:spans_prod@postgres:5432/spans"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: agentic-demo-config
  namespace: agentic-demo
data:
  agents: |
    - role: researcher
      tone: neutral_academic
      replicas: 1
    - role: writer
      tone: engaging_professional
      replicas: 1
    - role: editor
      tone: authoritative_precise
      replicas: 1
