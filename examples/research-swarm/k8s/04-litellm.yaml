---
apiVersion: v1
kind: Service
metadata:
  name: litellm-proxy
  namespace: agentic-demo
  labels:
    app: litellm-proxy
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  selector:
    app: litellm-proxy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-proxy
  namespace: agentic-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm-proxy
  template:
    metadata:
      labels:
        app: litellm-proxy
    spec:
      serviceAccountName: litellm-proxy
      containers:
      - name: litellm-proxy
        image: ghcr.io/berriai/litellm:main
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openai-secrets
              key: api-key
        - name: PORT
          value: "8000"
        volumeMounts:
        - name: litellm-config
          mountPath: /etc/litellm
          readOnly: true
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2Gi
      volumes:
      - name: litellm-config
        configMap:
          name: litellm-config
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: litellm-proxy
  namespace: agentic-demo
---
apiVersion: v1
kind: Secret
metadata:
  name: openai-secrets
  namespace: agentic-demo
type: Opaque
stringData:
  api-key: "your-openai-api-key-here"  # Replace with actual key
