---
apiVersion: v1
kind: Service
metadata:
  name: writer
  namespace: agentic-demo
  labels:
    app: writer
    agent: "true"
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  selector:
    app: writer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: writer
  namespace: agentic-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: writer
  template:
    metadata:
      labels:
        app: writer
        agent: "true"
        agent-role: writer
    spec:
      serviceAccountName: writer
      containers:
      - name: writer
        image: agentic-agent:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: AGENT_ROLE
          value: writer
        - name: AGENT_TONE
          value: engaging_professional
        - name: AGENT_PORT
          value: "8080"
        - name: LITELLM_PROXY_URL
          value: http://litellm-proxy:8000
        - name: LITELLM_KEY
          valueFrom:
            secretKeyRef:
              name: litellm-keys
              key: writer-key
        - name: MINIO_ENDPOINT
          value: http://minio:9000
        - name: MINIO_BUCKET
          value: agentic-demo
        - name: MINIO_ROOT_USER
          valueFrom:
            secretKeyRef:
              name: minio-secrets
              key: root-user
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: minio-secrets
              key: root-password
        - name: POSTGRES_URL
          valueFrom:
            secretKeyRef:
              name: postgres-secrets
              key: connection-string
        - name: LOG_LEVEL
          value: INFO
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1Gi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: writer
  namespace: agentic-demo
---
apiVersion: agentic.io/v1alpha1
kind: AgentWorkload
metadata:
  name: writer-workload
  namespace: agentic-demo
spec:
  agent:
    role: writer
    tone: engaging_professional
    replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  litellm:
    virtualKey: sk-writer-virtual
    dailyBudget: 30.0
  scaling:
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70
