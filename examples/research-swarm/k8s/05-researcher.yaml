---
apiVersion: v1
kind: Service
metadata:
  name: researcher
  namespace: agentic-demo
  labels:
    app: researcher
    agent: "true"
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  selector:
    app: researcher
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: researcher
  namespace: agentic-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: researcher
  template:
    metadata:
      labels:
        app: researcher
        agent: "true"
        agent-role: researcher
    spec:
      serviceAccountName: researcher
      containers:
      - name: researcher
        image: agentic-agent:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: AGENT_ROLE
          value: researcher
        - name: AGENT_TONE
          value: neutral_academic
        - name: AGENT_PORT
          value: "8080"
        - name: LITELLM_PROXY_URL
          value: http://litellm-proxy:8000
        - name: LITELLM_KEY
          valueFrom:
            secretKeyRef:
              name: litellm-keys
              key: researcher-key
        - name: MINIO_ENDPOINT
          value: http://minio:9000
        - name: MINIO_BUCKET
          value: agentic-demo
        - name: MINIO_ROOT_USER
          valueFrom:
            secretKeyRef:
              name: minio-secrets
              key: root-user
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: minio-secrets
              key: root-password
        - name: POSTGRES_URL
          valueFrom:
            secretKeyRef:
              name: postgres-secrets
              key: connection-string
        - name: LOG_LEVEL
          value: INFO
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1Gi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: researcher
  namespace: agentic-demo
---
apiVersion: agentic.io/v1alpha1
kind: AgentWorkload
metadata:
  name: researcher-workload
  namespace: agentic-demo
spec:
  agent:
    role: researcher
    tone: neutral_academic
    replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  litellm:
    virtualKey: sk-researcher-virtual
    dailyBudget: 20.0
  scaling:
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70
